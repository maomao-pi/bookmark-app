server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: zhilian-server

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/zhilian_fangzhou}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

  sql:
    init:
      mode: never

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhilian.server.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT 配置 - 使用环境变量
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

# AI 配置 - 使用环境变量
ai:
  glm:
    base-url: ${AI_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    model: ${AI_MODEL:glm-4}
    timeout: ${AI_TIMEOUT:15000}
    max-retries: ${AI_MAX_RETRIES:3}

# CORS 配置
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}

logging:
  level:
    com.zhilian.server: ${LOG_LEVEL:info}
