# 生产环境配置
server:
  port: 8080

spring:
  application:
    name: bookmark-app
  
  # 使用 MySQL (宝塔安装的 MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhilian_fangzhou?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_mysql_password  # 替换为你的 MySQL 密码
  
  # H2 内存数据库 (开发用)
  # datasource:
  #   driver-class-name: org.h2.Driver
  #   url: jdbc:h2:mem:bookmarkdb
  #   username: sa
  #   password: 

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhilian.server.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: your-secret-key-change-in-production  # 替换为安全的密钥
  expiration: 86400000  # 24小时

# 日志配置
logging:
  level:
    com.zhilian.server: info
  file:
    name: /www/wwwroot/bookmark/logs/app.log
