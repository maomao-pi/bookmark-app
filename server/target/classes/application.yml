server:
  port: 8080

spring:
  application:
    name: zhilian-server
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhilian_fangzhou?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 100822mi.
    hikari:
      maximum-pool-size: 10
  
  sql:
    init:
      mode: always
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhilian.server.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT 配置
jwt:
  secret: zhilian-fangzhou-secret-key-2024-very-long-and-secure
  expiration: 86400000

# AI 配置
ai:
  glm:
    base-url: https://open.bigmodel.cn/api/paas/v4
    model: glm-4.6
    timeout: 15000
    max-retries: 3

# CORS 配置
cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:5178,http://localhost:5179

logging:
  level:
    com.zhilian.server: debug
